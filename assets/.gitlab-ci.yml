stages:
  - deps
  - test
  - build

default:
  image: alpine:latest
  before_script:
    - echo "[global before]"
  after_script:
    - echo "[global after]"

install-deps:
  stage: deps
  image: ubuntu:24.04
  script:
    - apt-get update && apt-get -y upgrade
    - mkdir -p vendor
    - echo "dependency-output" > vendor/deps.txt
  artifacts:
    paths:
      - vendor/

test-project:
  stage: test
  image: fedora:40
  needs:
    - job: install-deps
      artifacts: true
  script:
    - cat vendor/deps.txt
    - echo "running tests"
    - dnf -y update

build-project:
  stage: build
  needs:
    - job: test-project
  script:
    - echo "building project"
