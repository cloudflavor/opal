stages:
  - deps
  - test
  - build

default:
  image: alpine:latest
  before_script:
    - echo "[global before]"
  after_script:
    - echo "[global after]"

install-deps:
  stage: deps
  image: ubuntu:24.04
  script:
    - apt-get update && apt-get -y upgrade
    - mkdir -p vendor
    - echo "dependency-output" > vendor/deps.txt
  artifacts:
    paths:
      - vendor/

setup-runner:
  stage: deps
  script:
    - echo "setting up runner context"
    - mkdir -p .runner
    - echo "runner ready" > .runner/status.txt
  artifacts:
    paths:
      - .runner/

prepare-cache:
  stage: deps
  script:
    - echo "priming build cache"
    - mkdir -p .cache
    - dd if=/dev/zero of=.cache/blob bs=1 count=32 status=none
  artifacts:
    paths:
      - .cache/

test-project:
  stage: test
  image: fedora:40
  needs:
    - job: install-deps
      artifacts: true
    - job: setup-runner
      artifacts: true
  script:
    - cat vendor/deps.txt
    - echo "running tests"
    - dnf -y update

lint-project:
  stage: test
  needs:
    - job: install-deps
      artifacts: true
  script:
    - echo "running linters"
    - ls -la vendor

build-project:
  stage: build
  needs:
    - job: test-project
    - job: lint-project
  script:
    - echo "building project"
