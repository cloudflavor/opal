stages:
  - deps
  - test
  - build
  - package
  - release
  - publish

default:
  image: docker.io/rustlang/rust:nightly
  before_script:
    - rustc --version
    - cargo --version
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"

fetch-sources:
  stage: deps
  script:
    - rustup component add rustfmt clippy
    - cargo fetch --locked

lint:
  stage: test
  needs:
    - fetch-sources
  script:
    - rustup component add rustfmt clippy
    - cargo fmt --all -- --check
    - cargo clippy --workspace --all-targets -- -D warnings

unit-tests:
  stage: test
  needs:
    - fetch-sources
    - lint
  script:
    - cargo test --all --all-targets --locked
  artifacts:
    when: always
    paths:
      - target/debug/deps/

build-release:
  stage: build
  needs:
    - unit-tests
    - lint
  script:
    - cargo build --release --locked
  artifacts:
    expire_in: 1 week
    paths:
      - target/release/opal

package-crate:
  stage: package
  needs:
    - build-release
  script:
    - cargo package --locked
  artifacts:
    expire_in: 1 week
    paths:
      - target/package/

release-artifacts:
  stage: release
  needs:
    - build-release
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
    - when: never
  script:
    - |
      set -euo pipefail
      VERSION="${CI_COMMIT_TAG:-$CI_COMMIT_REF_NAME}"
      ARCH_RAW="$(uname -m)"
      OS_RAW="$(uname -s)"
      case "${ARCH_RAW}" in
        x86_64|amd64) ARCH="x86_64" ;;
        arm64|aarch64) ARCH="aarch64" ;;
        *) ARCH="${ARCH_RAW}" ;;
      esac
      case "${OS_RAW}" in
        Darwin) OS="apple-darwin" ;;
        Linux) OS="unknown-linux-gnu" ;;
        *) OS="$(echo "${OS_RAW}" | tr '[:upper:]' '[:lower:]')" ;;
      esac
      PLATFORM="${ARCH}-${OS}"
      RELEASE_DIR="releases"
      mkdir -p "${RELEASE_DIR}"
      ARCHIVE="${RELEASE_DIR}/opal-${VERSION}-${PLATFORM}.tar.gz"
      NOTES="${RELEASE_DIR}/release-notes-${PLATFORM}.txt"
      mkdir -p target/release
      tar -czf "${ARCHIVE}" -C target/release opal
      SHA=$(shasum -a 256 "${ARCHIVE}" | awk '{print $1}')
      {
        echo "Release archive: ${ARCHIVE}"
        echo "SHA-256: ${SHA}"
        echo "Target: ${PLATFORM}"
      } > "${NOTES}"
  artifacts:
    paths:
      - releases/*.tar.gz
      - releases/release-notes-*.txt

publish-crate:
  stage: publish
  needs:
    - package-crate
    - release-artifacts
  rules:
    - if: "$CI_COMMIT_TAG && $CARGO_REGISTRY_TOKEN"
      when: manual
    - when: never
  script:
    - echo "publishing opal $CI_COMMIT_SHA"
    # - cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
