stages:
  - deps
  - test
  - build
  - package
  - release
  - publish

default:
  image: docker.io/rustlang/rust:nightly
  before_script:
    - rustup default nightly
    - rustc --version
    - cargo --version
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - /builds/.cargo/
      - /builds/.rustup/

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: "$CI_BUILDS_DIR/.cargo"
  RUSTUP_HOME: "$CI_BUILDS_DIR/.rustup"

fetch-sources:
  stage: deps
  script:
    - rustup component add rustfmt clippy
    - cargo fetch --locked

lint:
  stage: test
  needs:
    - fetch-sources
  script:
    - cargo fmt --all -- --check
    - cargo clippy --workspace --all-targets -- -D warnings

unit-tests:
  stage: test
  needs:
    - fetch-sources
    - lint
  script:
    - cargo test --all --all-targets --locked
  artifacts:
    when: always
    paths:
      - target/debug/deps/

extended-tests:
  stage: test
  needs:
    - fetch-sources
    - lint
    - unit-tests
  script:
    - command -v jq >/dev/null || (apt-get update && apt-get install -y jq)
    - cargo build --release --locked
    - ./scripts/test-pipelines.sh
  artifacts:
    when: always
    paths:
      - tests-temp/test-pipeline-logs/

build-release:
  stage: build
  needs:
    - unit-tests
    - extended-tests
    - lint
  script:
    - cargo build --release --locked
  artifacts:
    expire_in: 1 week
    paths:
      - target/release/opal

package-crate:
  stage: package
  needs:
    - build-release
  script:
    - cargo package --locked
  artifacts:
    expire_in: 1 week
    paths:
      - target/package/

release-artifacts:
  stage: release
  needs:
    - build-release
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
    - when: never
  script:
    - ./scripts/build-release-artifacts.sh
  artifacts:
    paths:
      - releases/*.tar.gz
      - releases/release-notes-*.txt

publish-crate:
  stage: publish
  needs:
    - package-crate
    - release-artifacts
  rules:
    - if: "$CI_COMMIT_TAG && $CARGO_REGISTRY_TOKEN"
      when: manual
    - when: never
  script:
    - echo "publishing opal $CI_COMMIT_SHA"
    - cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
