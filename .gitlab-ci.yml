stages:
  - deps
  - test
  - build
  - package
  - release
  - publish

default:
  image: docker.io/library/rust:1.90
  before_script:
    - rustc --version
    - cargo --version
    - rustup component add rustfmt clippy
    - export CARGO_TARGET_DIR="$CI_PROJECT_DIR/target/${CI_JOB_NAME_SLUG:-job}"
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/
      - target/

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_BUILD_JOBS: "1"

fetch-sources:
  stage: deps
  script:
    - cargo fetch --locked

rust-checks:
  stage: test
  needs:
    - job: fetch-sources
      artifacts: false
  script:
    - cargo check
    - cargo fmt --all -- --check
    - CARGO_INCREMENTAL=0 cargo clippy --workspace --all-targets -- -D warnings

ui-docs-check:
  stage: test
  image: docker.io/library/node:22
  before_script: []
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"
  cache:
    key: "$CI_COMMIT_REF_SLUG-ui-docs"
    paths:
      - .cache/npm/
  script:
    - npm --prefix ui-docs ci
    - npm --prefix ui-docs run check

unit-tests:
  stage: test
  needs:
    - job: fetch-sources
      artifacts: false
    - job: rust-checks
      artifacts: false
  script:
    - cargo test --all --all-targets --locked

extended-tests:
  stage: test
  needs:
    - job: fetch-sources
      artifacts: false
    - job: rust-checks
      artifacts: false
    - job: unit-tests
      artifacts: false
  script:
    - if [ -d "/opal/${CI_PIPELINE_ID:-}" ] || [ -d /opal ]; then echo "skipping nested opal fixture run"; exit 0; fi
    - command -v jq >/dev/null || (apt-get update && apt-get install -y jq)
    - cargo build --release --locked
    - export OPAL_BIN="$CARGO_TARGET_DIR/release/opal"
    - >
      ./scripts/test-pipelines.sh
      needs-branch
      needs-optional
      needs-tag
      tag-ambiguity
      rules-schedule
      rules-force-docs
      includes-inherit
      cache-key-files
      filters-branch
      filters-tag
      environment-stop
  artifacts:
    when: always
    paths:
      - tests-temp/test-pipeline-logs/

e2e-tests:
  stage: test
  needs:
    - job: fetch-sources
      artifacts: false
    - job: rust-checks
      artifacts: false
    - job: unit-tests
      artifacts: false
  script:
    - if [ -d "/opal/${CI_PIPELINE_ID:-}" ] || [ -d /opal ]; then echo "skipping nested opal fixture run"; exit 0; fi
    - command -v jq >/dev/null || (apt-get update && apt-get install -y jq)
    - cargo build --release --locked
    - export OPAL_BIN="$CARGO_TARGET_DIR/release/opal"
    - >
      ./scripts/test-pipelines.sh
      resources-services
      services-readiness-failure
      cache-policies
      cache-fallback
      dotenv-reports
      secret-masking
  artifacts:
    when: always
    paths:
      - tests-temp/test-pipeline-logs/

ui-docs-build:
  stage: build
  image: docker.io/library/node:22
  before_script: []
  needs:
    - ui-docs-check
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"
  cache:
    key: "$CI_COMMIT_REF_SLUG-ui-docs"
    paths:
      - .cache/npm/
  script:
    - npm --prefix ui-docs ci
    - npm --prefix ui-docs run build
  artifacts:
    expire_in: 1 week
    paths:
      - ui-docs/.svelte-kit/cloudflare/

package-crate:
  stage: package
  inherit:
    default: [image, before_script]
  cache: []
  variables:
    CARGO_HOME: "/usr/local/cargo"
    RUSTUP_HOME: "/usr/local/rustup"
    TMPDIR: "$CI_PROJECT_DIR/target/tmp"
  script:
    - mkdir -p "$TMPDIR"
    - cargo package --locked
  artifacts:
    expire_in: 1 week
    paths:
      - target/package/

release-artifacts:arm64:
  stage: release
  needs:
    - job: rust-checks
      artifacts: false
    - job: unit-tests
      artifacts: false
    - job: extended-tests
      artifacts: false
    - job: e2e-tests
      artifacts: false
    - job: ui-docs-check
      artifacts: false
  image:
    name: docker.io/library/rust:1.90
    docker:
      platform: linux/arm64
  variables:
    RELEASE_TARGETS: "aarch64-unknown-linux-gnu"
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
    - when: never
  script:
    - bash ./scripts/build-release-artifacts.sh
  artifacts:
    paths:
      - releases/*.tar.gz
      - releases/release-notes-*.txt

release-artifacts:amd64:
  stage: release
  needs:
    - job: rust-checks
      artifacts: false
    - job: unit-tests
      artifacts: false
    - job: extended-tests
      artifacts: false
    - job: e2e-tests
      artifacts: false
    - job: ui-docs-check
      artifacts: false
  image:
    name: docker.io/library/rust:1.90
    docker:
      platform: linux/amd64
  variables:
    RELEASE_TARGETS: "x86_64-unknown-linux-gnu"
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
    - when: never
  script:
    - bash ./scripts/build-release-artifacts.sh
  artifacts:
    paths:
      - releases/*.tar.gz
      - releases/release-notes-*.txt

publish-crate:
  stage: publish
  needs:
    - package-crate
    - release-artifacts:arm64
    - release-artifacts:amd64
  rules:
    - if: "$CI_COMMIT_TAG && $CARGO_REGISTRY_TOKEN"
      when: on_success
    - when: never
  script:
    - bash ./scripts/check-release-tag-version.sh
    - echo "publishing opal $CI_COMMIT_TAG"
    - cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"

publish-github-release:
  stage: publish
  image: docker.io/library/debian:bookworm-slim
  before_script: []
  needs:
    - release-artifacts:arm64
    - release-artifacts:amd64
  rules:
    - if: "$CI_COMMIT_TAG && $GITHUB_TOKEN && $GITHUB_REPOSITORY"
      when: on_success
    - when: never
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash ca-certificates curl jq
    - bash ./scripts/check-release-tag-version.sh
    - bash ./scripts/publish-github-release.sh
