stages:
  - deps
  - test
  - build
  - package
  - release
  - publish

default:
  image: docker.io/library/rust:1.90
  before_script:
    - export PATH="/opt/homebrew/bin:$HOME/.cargo/bin:$PATH"
    - rustc --version
    - cargo --version
    - export CARGO_TARGET_DIR="$CI_PROJECT_DIR/target/${CI_JOB_NAME_SLUG:-job}"
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/
      - target/

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_BUILD_JOBS: "1"
  RUSTC_WRAPPER: ""
  SCCACHE_DISABLE: "1"

fetch-sources:
  stage: deps
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    policy: pull-push
    paths:
      - .cargo/
      - target/
  script:
    - cargo fetch --locked

rust-checks:
  stage: test
  needs:
    - job: fetch-sources
      artifacts: false
  before_script:
    - rustc --version
    - cargo --version
    - rustup component add rustfmt clippy
    - export CARGO_TARGET_DIR="$CI_PROJECT_DIR/target/${CI_JOB_NAME_SLUG:-job}"
  variables:
    CARGO_INCREMENTAL: "0"
    CARGO_NET_OFFLINE: "true"
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    policy: pull
    paths:
      - .cargo/
      - target/
  script:
    - cargo check --workspace --all-targets --locked
    - cargo fmt --all -- --check
    - cargo clippy --workspace --all-targets -- -D warnings

ui-docs-check:
  stage: test
  image: docker.io/library/node:22
  before_script: []
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"
  cache:
    key: "$CI_COMMIT_REF_SLUG-ui-docs"
    paths:
      - .cache/npm/
  script:
    - npm --prefix ui-docs ci
    - npm --prefix ui-docs run check

unit-tests:
  stage: test
  needs:
    - job: fetch-sources
      artifacts: false
    - job: rust-checks
      artifacts: false
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    policy: pull
    paths:
      - .cargo/
  variables:
    CARGO_NET_OFFLINE: "true"
  script:
    - cargo test --workspace --lib --bins --locked

build-opal-bin:
  stage: test
  needs:
    - job: fetch-sources
      artifacts: false
  variables:
    CARGO_NET_OFFLINE: "true"
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    policy: pull
    paths:
      - .cargo/
      - target/
  script:
    - cargo install --path crates/opal --locked --root "$CI_PROJECT_DIR/.opal-installed"
  artifacts:
    paths:
      - .opal-installed/

opal-install-smoke:
  stage: test
  needs:
    - job: build-opal-bin
      artifacts: true
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    policy: pull
    paths:
      - .cargo/
      - target/
  script:
    - $CI_PROJECT_DIR/.opal-installed/bin/opal --version

extended-tests:
  stage: test
  needs:
    - job: fetch-sources
      artifacts: false
    - job: rust-checks
      artifacts: false
    - job: unit-tests
      artifacts: false
    - job: build-opal-bin
      artifacts: true
  variables:
    CARGO_NET_OFFLINE: "true"
    OPAL_TMP_TEST_ROOT: "/tmp/opal-extended-tests"
    OPAL_TEST_ARGS: "--no-tui"
  before_script:
    - export PATH="/opt/homebrew/bin:$HOME/.cargo/bin:$PATH"
    - rustc --version
    - cargo --version
    - export CARGO_TARGET_DIR="$CI_PROJECT_DIR/target/${CI_JOB_NAME_SLUG:-job}"
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    policy: pull
    paths:
      - .cargo/
      - target/
  script:
    - >
      ./scripts/run-opal-suite-in-temp-workdir.sh
      extended-tests
      needs-branch
      needs-optional
      needs-tag
      tag-ambiguity
      rules-schedule
      rules-force-docs
      includes-inherit
      cache-key-files
      filters-branch
      filters-tag
      environment-stop
  artifacts:
    when: always
    paths:
      - tests-temp/test-pipeline-logs/

e2e-tests:
  stage: test
  needs:
    - job: fetch-sources
      artifacts: false
    - job: rust-checks
      artifacts: false
    - job: unit-tests
      artifacts: false
    - job: build-opal-bin
      artifacts: true
  variables:
    CARGO_NET_OFFLINE: "true"
    OPAL_TMP_TEST_ROOT: "/tmp/opal-e2e-tests"
    OPAL_TEST_ARGS: "--no-tui"
  before_script:
    - export PATH="/opt/homebrew/bin:$HOME/.cargo/bin:$PATH"
    - rustc --version
    - cargo --version
    - export CARGO_TARGET_DIR="$CI_PROJECT_DIR/target/${CI_JOB_NAME_SLUG:-job}"
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    policy: pull
    paths:
      - .cargo/
      - target/
  script:
    - >
      ./scripts/run-opal-suite-in-temp-workdir.sh
      e2e-tests
      cache-policies
      cache-fallback
      dotenv-reports
      bootstrap-runner
      secret-masking
  artifacts:
    when: always
    paths:
      - tests-temp/test-pipeline-logs/

e2e-services:
  stage: test
  image:
    name: docker.io/library/rust:1.90
    docker:
      user: "0:0"
  needs:
    - job: fetch-sources
      artifacts: false
    - job: rust-checks
      artifacts: false
    - job: unit-tests
      artifacts: false
  variables:
    CARGO_NET_OFFLINE: "true"
    OPAL_TEST_ARGS: "--no-tui"
  before_script:
    - export PATH="/opt/homebrew/bin:$HOME/.cargo/bin:$PATH"
    - export DEBIAN_FRONTEND=noninteractive
    - rustc --version
    - cargo --version
    - podman --version
    - export CARGO_TARGET_DIR="$CI_PROJECT_DIR/target/${CI_JOB_NAME_SLUG:-job}"
    - cargo install --path crates/opal --locked --root "$CI_PROJECT_DIR/.opal-installed"
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    policy: pull
    paths:
      - .cargo/
      - target/
  script:
    - export OPAL_BIN="$CI_PROJECT_DIR/.opal-installed/bin/opal"
    - export OPAL_TEST_SUITE="e2e-services"
    - export OPAL_TEST_ARGS="--no-tui"
    - export OPAL_HOST_UID="0"
    - export OPAL_HOST_GID="0"
    - >
      ./scripts/test-pipelines.sh
      resources-services
      services-readiness-failure
  artifacts:
    when: always
    paths:
      - tests-temp/test-pipeline-logs/

ui-docs-build:
  stage: build
  image: docker.io/library/node:22
  before_script: []
  needs:
    - ui-docs-check
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"
  cache:
    key: "$CI_COMMIT_REF_SLUG-ui-docs"
    paths:
      - .cache/npm/
  script:
    - npm --prefix ui-docs ci
    - npm --prefix ui-docs run build
  artifacts:
    expire_in: 1 week
    paths:
      - ui-docs/.svelte-kit/cloudflare/

package-crate:
  stage: package
  inherit:
    default: [image, before_script]
  cache: []
  variables:
    CARGO_HOME: "/usr/local/cargo"
    RUSTUP_HOME: "/usr/local/rustup"
    TMPDIR: "$CI_PROJECT_DIR/target/tmp"
  script:
    - mkdir -p "$TMPDIR"
    - cargo package -p opal-cli --locked
  artifacts:
    expire_in: 1 week
    paths:
      - target/package/

release-artifacts:arm64:
  stage: release
  needs:
    - job: rust-checks
      artifacts: false
    - job: opal-install-smoke
      artifacts: false
    - job: unit-tests
      artifacts: false
    - job: extended-tests
      artifacts: false
    - job: e2e-tests
      artifacts: false
    - job: e2e-services
      artifacts: false
    - job: ui-docs-check
      artifacts: false
  image:
    name: docker.io/library/rust:1.90
    docker:
      platform: linux/arm64
  variables:
    RELEASE_TARGETS: "aarch64-unknown-linux-gnu"
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
    - when: never
  script:
    - bash ./scripts/build-release-artifacts.sh
  artifacts:
    paths:
      - releases/*.tar.gz
      - releases/release-notes-*.txt

release-artifacts:amd64:
  stage: release
  needs:
    - job: rust-checks
      artifacts: false
    - job: opal-install-smoke
      artifacts: false
    - job: unit-tests
      artifacts: false
    - job: extended-tests
      artifacts: false
    - job: e2e-tests
      artifacts: false
    - job: e2e-services
      artifacts: false
    - job: ui-docs-check
      artifacts: false
  image:
    name: docker.io/library/rust:1.90
    docker:
      platform: linux/amd64
  variables:
    RELEASE_TARGETS: "x86_64-unknown-linux-gnu"
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
    - when: never
  script:
    - bash ./scripts/build-release-artifacts.sh
  artifacts:
    paths:
      - releases/*.tar.gz
      - releases/release-notes-*.txt

release-artifacts:macos-aarch64:
  stage: release
  needs:
    - job: rust-checks
      artifacts: false
    - job: opal-install-smoke
      artifacts: false
    - job: unit-tests
      artifacts: false
    - job: extended-tests
      artifacts: false
    - job: e2e-tests
      artifacts: false
    - job: e2e-services
      artifacts: false
    - job: ui-docs-check
      artifacts: false
  tags:
    - macos-arm64
  variables:
    RELEASE_TARGETS: "macos-aarch64"
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
    - when: never
  script:
    - bash ./scripts/build-release-artifacts.sh
  artifacts:
    paths:
      - releases/*.tar.gz
      - releases/release-notes-*.txt

publish-crate:
  stage: publish
  needs:
    - package-crate
    - release-artifacts:arm64
    - release-artifacts:amd64
    - release-artifacts:macos-aarch64
  rules:
    - if: "$CI_COMMIT_TAG && $CARGO_REGISTRY_TOKEN"
      when: on_success
    - when: never
  script:
    - bash ./scripts/check-release-tag-version.sh
    - echo "publishing opal $CI_COMMIT_TAG"
    - cargo publish -p opal-cli --locked --token "$CARGO_REGISTRY_TOKEN"

publish-github-release:
  stage: publish
  image: docker.io/library/debian:bookworm-slim
  before_script: []
  needs:
    - release-artifacts:arm64
    - release-artifacts:amd64
    - release-artifacts:macos-aarch64
  rules:
    - if: "$CI_COMMIT_TAG && $GITHUB_TOKEN && $GITHUB_REPOSITORY"
      when: on_success
    - when: never
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash ca-certificates curl jq
    - bash ./scripts/check-release-tag-version.sh
    - bash ./scripts/publish-github-release.sh
