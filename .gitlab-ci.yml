stages:
  - deps
  - test
  - build
  - package
  - release
  - publish

default:
  image: docker.io/library/rust:1.90
  before_script:
    - rustc --version
    - cargo --version
    - rustup component add rustfmt clippy
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/
      - target/

variables:
  CARGO_TERM_COLOR: always
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TARGET_DIR: "$CI_PROJECT_DIR/target"
  CARGO_BUILD_JOBS: "1"

fetch-sources:
  stage: deps
  script:
    - cargo fetch --locked

lint:
  stage: test
  needs:
    - fetch-sources
  script:
    - cargo fmt --all -- --check
    - cargo clippy --workspace --all-targets -- -D warnings

ui-docs-check:
  stage: test
  image: docker.io/library/node:22
  before_script: []
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"
  cache:
    key: "$CI_COMMIT_REF_SLUG-ui-docs"
    paths:
      - .cache/npm/
  script:
    - npm --prefix ui-docs ci
    - npm --prefix ui-docs run check

unit-tests:
  stage: test
  needs:
    - fetch-sources
    - lint
  script:
    - cargo test --all --all-targets --locked
  artifacts:
    when: always
    paths:
      - target/debug/deps/

extended-tests:
  stage: test
  needs:
    - fetch-sources
    - lint
    - unit-tests
  script:
    - if [ -d "/opal/${CI_PIPELINE_ID:-}" ] || [ -d /opal ]; then echo "skipping nested opal fixture run"; exit 0; fi
    - command -v jq >/dev/null || (apt-get update && apt-get install -y jq)
    - cargo build --release --locked
    - export OPAL_BIN=target/release/opal
    - >
      ./scripts/test-pipelines.sh
      needs-branch
      needs-optional
      needs-tag
      tag-ambiguity
      rules-schedule
      rules-force-docs
      includes-inherit
      cache-key-files
      filters-branch
      filters-tag
      environment-stop
  artifacts:
    when: always
    paths:
      - tests-temp/test-pipeline-logs/

e2e-tests:
  stage: test
  needs:
    - fetch-sources
    - lint
    - unit-tests
  script:
    - if [ -d "/opal/${CI_PIPELINE_ID:-}" ] || [ -d /opal ]; then echo "skipping nested opal fixture run"; exit 0; fi
    - command -v jq >/dev/null || (apt-get update && apt-get install -y jq)
    - cargo build --release --locked
    - export OPAL_BIN=target/release/opal
    - >
      ./scripts/test-pipelines.sh
      resources-services
      services-readiness-failure
      cache-policies
      cache-fallback
      dotenv-reports
      secret-masking
  artifacts:
    when: always
    paths:
      - tests-temp/test-pipeline-logs/

build-release:
  stage: build
  needs:
    - unit-tests
    - extended-tests
    - e2e-tests
    - lint
    - ui-docs-check
  script:
    - cargo build --release --locked
  artifacts:
    expire_in: 1 week
    paths:
      - target/release/opal

ui-docs-build:
  stage: build
  image: docker.io/library/node:22
  before_script: []
  needs:
    - ui-docs-check
  variables:
    npm_config_cache: "$CI_PROJECT_DIR/.cache/npm"
  cache:
    key: "$CI_COMMIT_REF_SLUG-ui-docs"
    paths:
      - .cache/npm/
  script:
    - npm --prefix ui-docs ci
    - npm --prefix ui-docs run build
  artifacts:
    expire_in: 1 week
    paths:
      - ui-docs/.svelte-kit/cloudflare/

package-crate:
  stage: package
  inherit:
    default: [image, before_script]
  cache: []
  variables:
    CARGO_HOME: "/usr/local/cargo"
    RUSTUP_HOME: "/usr/local/rustup"
    TMPDIR: "$CI_PROJECT_DIR/target/tmp"
  script:
    - mkdir -p "$TMPDIR"
    - cargo package --locked
  artifacts:
    expire_in: 1 week
    paths:
      - target/package/

release-artifacts:
  stage: release
  needs:
    - build-release
  rules:
    - if: "$CI_COMMIT_TAG"
      when: on_success
    - when: never
  script:
    - ./scripts/build-release-artifacts.sh
  artifacts:
    paths:
      - releases/*.tar.gz
      - releases/release-notes-*.txt

publish-crate:
  stage: publish
  needs:
    - package-crate
    - release-artifacts
  rules:
    - if: "$CI_COMMIT_TAG && $CARGO_REGISTRY_TOKEN"
      when: manual
    - when: never
  script:
    - echo "publishing opal $CI_COMMIT_SHA"
    - cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
