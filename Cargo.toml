[package]
name = "opal"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
serde = "1.0.228"
serde_json = "1.0.149"
serde_yaml = "0.9.34"
structopt = "0.3.26"
tokio = { version ="1.49.0", features = ["fs", "rt-multi-thread", "macros"] }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }
