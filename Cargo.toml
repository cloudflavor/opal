[package]
name = "opal"
version = "0.1.0"
edition = "2021"
authors = ["Victor Palade <victor@cloudflavor.io>"]
description = "From 0 to Global in an instant. DNS and Load Balancer control plane on any cloud and infrastructure."
license = "Apache-2.0"
repository = "https://github.com/cloudflavor/skycrane"
readme = "README.md"


[dependencies]
anyhow = "1.0"
prost = "0.13"
prost-types = "0.13"
structopt = "0.3.26"
tokio = { version = "^1.38", features = ["rt-multi-thread", "macros"] }
tonic = { version = "0.12" }
tracing = "0.1.40"
tracing-subscriber = "0.3.18"


[build-dependencies]
tonic-build = { version = "0.12", features = ["prost"] }
