stages:
  - deploy
  - verify
  - stop

default:
  image: docker.io/library/alpine:3.19

deploy-review:
  stage: deploy
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - when: manual
  script:
    - echo "deploying review env for ${CI_COMMIT_REF_NAME:-local}"
  environment:
    name: review/${CI_COMMIT_REF_SLUG:-local}
    url: https://example.com/review/${CI_COMMIT_REF_SLUG:-local}
    on_stop: stop-review
    auto_stop_in: 1 day

prepare-review:
  stage: verify
  script:
    - echo "preparing review env ${CI_COMMIT_REF_NAME:-local}"
  environment:
    name: review/${CI_COMMIT_REF_SLUG:-local}
    action: prepare

verify-review:
  stage: verify
  script:
    - echo "verifying review env ${CI_COMMIT_REF_NAME:-local}"
  environment:
    name: review/${CI_COMMIT_REF_SLUG:-local}
    action: verify

access-review:
  stage: verify
  script:
    - echo "accessing review env ${CI_COMMIT_REF_NAME:-local}"
  environment:
    name: review/${CI_COMMIT_REF_SLUG:-local}
    action: access

stop-review:
  stage: stop
  when: manual
  script:
    - echo "stopping review env ${CI_COMMIT_REF_NAME:-local}"
  environment:
    name: review/${CI_COMMIT_REF_SLUG:-local}
    action: stop
